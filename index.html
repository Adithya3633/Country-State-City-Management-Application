<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geo Ledger - Country State City Management</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #07131f;
        color: #e6eef7;
        font-family: Inter, system-ui, sans-serif;
      }
      #root {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }
      .app-root {
        background: rgba(15, 33, 60, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.25);
        padding: 28px;
      }
      .top-section {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
      }
      .top-section h1 {
        margin: 0;
        font-size: clamp(1.9rem, 2.5vw, 2.5rem);
      }
      .primary-button,
      .small-button {
        border: none;
        border-radius: 999px;
        padding: 10px 16px;
        cursor: pointer;
      }
      .primary-button {
        background: #4974ff;
        color: white;
      }
      .country-list {
        display: grid;
        gap: 18px;
      }
      .country-card,
      .state-card,
      .city-row {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
      }
      .country-card {
        padding: 18px;
      }
      .country-header,
      .state-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }
      .country-title,
      .state-title {
        font-weight: 700;
      }
      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .small-button.edit {
        background: rgba(74, 124, 255, 0.15);
        color: #b8d2ff;
      }
      .small-button.delete {
        background: rgba(255, 76, 99, 0.16);
        color: #ffb3b9;
      }
      .small-button.add {
        background: rgba(76, 198, 139, 0.16);
        color: #c8f4d5;
      }
      .state-list {
        margin-top: 18px;
        display: grid;
        gap: 14px;
      }
      .state-card {
        padding: 16px;
      }
      .city-list {
        margin-top: 14px;
        display: grid;
        gap: 10px;
      }
      .city-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 14px;
      }
      .hint,
      .empty-state {
        color: #b6c8e2;
        margin-top: 14px;
      }
      @media (max-width: 720px) {
        .top-section,
        .country-header,
        .state-header,
        .city-row {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <script src="./src/CityList.js"></script>
    <script src="./src/StateList.js"></script>
    <script src="./src/CountryList.js"></script>
    <script src="./src/App.js"></script>
    <script src="./src/index.js"></script>
  </body>
</html>
